<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX ID</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #00f2ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 400px; text-align: center; border: 1px solid #333; padding: 20px; background: #111; }
        h1 { font-size: 24px; letter-spacing: 3px; color: #fff; }
        input { background: #000; border: 1px solid #00f2ff; color: #00f2ff; padding: 12px; font-size: 18px; text-align: center; width: 90%; margin-bottom: 20px; outline: none;}
        button { background: #00f2ff; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin: 5px 0; }
        #capture-area { background: #111; padding: 15px; border: 1px solid #222; margin-top: 10px; }
        .matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 300px; margin: 15px auto; }
        .cell { border: 1px solid #00f2ff; height: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cell-label { font-size: 10px; color: #555; margin-bottom: 5px; }
        .cell-value { font-size: 18px; font-weight: bold; color: #fff; }
        .work-numbers { font-size: 13px; color: #00f2ff; opacity: 0.6; margin-bottom: 10px; }
        .footer { font-size: 11px; color: #444; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>MATRIX ID</h1>
    <p style="font-size: 12px;">Введите дату (например: 14.05.1990)</p>
    <input type="text" id="birthDate" placeholder="ДД.ММ.ГГГГ">
    <button onclick="calculate()">Рассчитать</button>
    <div id="capture-area">
        <div class="work-numbers" id="workNums">Доп. числа: -</div>
        <div class="matrix">
            <div class="cell"><span class="cell-label">1. Характер</span><span class="cell-value" id="c1">-</span></div>
            <div class="cell"><span class="cell-label">4. Здоровье</span><span class="cell-value" id="c4">-</span></div>
            <div class="cell"><span class="cell-label">7. Удача</span><span class="cell-value" id="c7">-</span></div>
            <div class="cell"><span class="cell-label">2. Энергия</span><span class="cell-value" id="c2">-</span></div>
            <div class="cell"><span class="cell-label">5. Логика</span><span class="cell-value" id="c5">-</span></div>
            <div class="cell"><span class="cell-label">8. Долг</span><span class="cell-value" id="c8">-</span></div>
            <div class="cell"><span class="cell-label">3. Интерес</span><span class="cell-value" id="c3">-</span></div>
            <div class="cell"><span class="cell-label">6. Труд</span><span class="cell-value" id="c6">-</span></div>
            <div class="cell"><span class="cell-label">9. Память</span><span class="cell-value" id="c9">-</span></div>
        </div>
        <div class="footer">t.me/ТВОЙ_КАНАЛ</div>
    </div>
    <button style="background: #222; color: #fff;" onclick="takeScreenshot()">Скачать скриншот</button>
</div>
<script>
    function calculate() {
        const input = document.getElementById('birthDate').value;
        const cleanDate = input.replace(/\D/g, '');
        if (cleanDate.length !== 8) { alert("Введите дату полностью: ДДММГГГГ"); return; }
        const day = cleanDate.substring(0, 2);
        const d1 = parseInt(day[0]);
        const d2 = parseInt(day[1]);
        const dayFirstDigit = d1 !== 0 ? d1 : d2;
        const digits = cleanDate.split('').map(Number);
        const n1 = digits.reduce((a, b) => a + b, 0);
        const n2 = String(n1).split('').reduce((a, b) => Number(a) + Number(b), 0);
        const n3 = n1 - (dayFirstDigit * 2);
        const n4 = String(Math.abs(n3)).split('').reduce((a, b) => Number(a) + Number(b), 0);
        document.getElementById('workNums').innerText = `Числа: ${n1}, ${n2}, ${n3}, ${n4}`;
        const finalString = cleanDate + n1 + n2 + n3 + n4;
        for (let i = 1; i <= 9; i++) {
            const count = finalString.split('').filter(c => c == i).join('');
            document.getElementById('c' + i).innerText = count || '---';
        }
    }
    function takeScreenshot() {
        html2canvas(document.getElementById('capture-area'), {backgroundColor: "#111"}).then(canvas => {
            let link = document.createElement('a');
            link.download = 'matrix.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
