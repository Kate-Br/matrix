<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATRIX ID MAX | Брынских Екатерина</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-violet: #8a2be2; 
            --neon-lilac: #df00ff;   
            --bg-dark: #05000a; 
            --bg-accent: #1a0033; 
            --text-color: #ffffff; 
        }

        body { 
            background: radial-gradient(circle at center, var(--bg-accent) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-color); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }

        .container { 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid rgba(223, 0, 255, 0.3); 
            padding: 25px; 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(10px);
            border-radius: 30px; 
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(138, 43, 226, 0.2); 
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 32px; 
            letter-spacing: 6px; 
            background: linear-gradient(to bottom, #fff, var(--neon-lilac));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0; 
            text-transform: uppercase; 
        }

        .author-status {
            font-size: 11px;
            color: var(--neon-lilac);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(223, 0, 255, 0.6);
        }

        input { 
            background: rgba(0, 0, 0, 0.6); 
            border: 2px solid var(--primary-violet); 
            color: var(--neon-lilac); 
            padding: 18px; 
            font-size: 22px; 
            text-align: center; 
            width: 85%; 
            outline: none; 
            border-radius: 15px; 
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .calc-btn { 
            background: linear-gradient(90deg, var(--primary-violet), var(--neon-lilac)); 
            color: #fff; 
            border: none; 
            padding: 20px; 
            font-weight: 900; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            border-radius: 15px; 
            transition: 0.4s; 
            font-size: 16px;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
        }

        .calc-btn:hover { 
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        #capture-area { 
            background: rgba(0, 0, 0, 0.3); 
            padding: 25px; 
            border-radius: 20px; 
            margin-top: 15px; 
        }

        .work-numbers { 
            font-size: 16px; 
            color: var(--neon-lilac); 
            margin-bottom: 20px; 
            font-weight: 700; 
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(223, 0, 255, 0.4);
        }

        .matrix { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            width: 320px; 
            margin: 25px auto; 
        }

        .cell { 
            border: 1.5px solid rgba(223, 0, 255, 0.4); 
            height: 95px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-radius: 18px; 
            background: rgba(255, 255, 255, 0.03); 
        }

        .cell-label { 
            font-size: 10px; 
            color: #888; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
        }

        .cell-value { 
            font-size: 24px; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 15px var(--neon-lilac); 
        }

        .property-info { 
            margin-top: 25px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; 
            font-size: 10px; 
            color: #666; 
        }

        .author-tg {
            display: block;
            color: var(--neon-lilac);
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
        }

        .download-btn { 
            background: transparent; 
            color: #555; 
            border: 1px solid #333;
            padding: 12px; 
            font-size: 11px; 
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MATRIX ID</h1>
    <div class="author-status">АВТОРСКИЙ КАЛЬКУЛЯТОР БРЫНСКИХ ЕКАТЕРИНЫ</div>
    
    <input type="text" id="birthDate" placeholder="ДД.ММ.ГГГГ">
    <button class="calc-btn" onclick="calculate()">Открыть тайну чисел</button>
    
    <div id="capture-area">
        <div class="work-numbers" id="workNums">Дополнительные числа: —</div>
        
        <div class="matrix">
            <div class="cell"><span class="cell-label">Характер</span><span class="cell-value" id="c1">-</span></div>
            <div class="cell"><span class="cell-label">Здоровье</span><span class="cell-value" id="c4">-</span></div>
            <div class="cell"><span class="cell-label">Удача</span><span class="cell-value" id="c7">-</span></div>
            <div class="cell"><span class="cell-label">Энергия</span><span class="cell-value" id="c2">-</span></div>
            <div class="cell"><span class="cell-label">Логика</span><span class="cell-value" id="c5">-</span></div>
            <div class="cell"><span class="cell-label">Долг</span><span class="cell-value" id="c8">-</span></div>
            <div class="cell"><span class="cell-label">Интерес</span><span class="cell-value" id="c3">-</span></div>
            <div class="cell"><span class="cell-label">Труд</span><span class="cell-value" id="c6">-</span></div>
            <div class="cell"><span class="cell-label">Память</span><span class="cell-value" id="c9">-</span></div>
        </div>
        
        <div class="property-info">
            © <strong>Интеллектуальная собственность Брынских Екатерина.</strong><br>
            Все права защищены. Копирование запрещено.<br>
            <a href="https://t.me/your_numer0logist" class="author-tg" target="_blank">@your_numer0logist</a>
        </div>
    </div>
    
    <button class="download-btn" onclick="takeScreenshot()">Сохранить анализ (PNG)</button>
</div>

<script>
    function calculate() {
        const input = document.getElementById('birthDate').value;
        const cleanDate = input.replace(/\D/g, '');
        if (cleanDate.length !== 8) { alert("Пожалуйста, введите дату полностью."); return; }
        
        const day = cleanDate.substring(0, 2);
        const d1 = parseInt(day[0]);
        const d2 = parseInt(day[1]);
        const dayFirstDigit = d1 !== 0 ? d1 : d2;
        
        const digits = cleanDate.split('').map(Number);
        const n1 = digits.reduce((a, b) => a + b, 0);
        const n2 = String(n1).split('').reduce((a, b) => Number(a) + Number(b), 0);
        const n3 = n1 - (dayFirstDigit * 2);
        const n4 = String(Math.abs(n3)).split('').reduce((a, b) => Number(a) + Number(b), 0);
        
        document.getElementById('workNums').innerText = `Дополнительные числа: ${n1}.${n2} | ${n3}.${n4}`;
        
        const finalString = cleanDate + n1 + n2 + n3 + n4;
        for (let i = 1; i <= 9; i++) {
            const count = finalString.split('').filter(c => c == i).join('');
            document.getElementById('c' + i).innerText = count || 'нет';
        }
    }
    
    function takeScreenshot() {
        const area = document.getElementById('capture-area');
        html2canvas(area, {
            backgroundColor: "#05000a", 
            scale: 3
        }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'matrix_analysis.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
